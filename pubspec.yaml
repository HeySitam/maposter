name: maposter
description: >-
  Turn a city name into a minimalist OpenStreetMap poster: geocoding, Overpass
  map data, Mercator projection, CustomPainter rendering, and PNG/PDF export.
version: 0.2.0
repository: https://github.com/HeySitam/maposter
issue_tracker: https://github.com/HeySitam/maposter/issues
topics:
  - maps
  - openstreetmap
  - poster
  - cartography

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter

  # Immutable data classes & JSON
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Networking
  dio: ^5.8.0

  # Fonts (rendering). Wide range so older-Flutter consumers can stay on 6.x
  # while newer setups pick up the latest.
  google_fonts: ">=6.2.1 <9.0.0"

  # PDF export
  pdf: ^3.11.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.4

flutter:
  assets:
    - assets/themes/
